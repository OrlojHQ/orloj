name: docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "vocs.config.ts"
      - "package.json"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "vocs.config.ts"
      - "package.json"

jobs:
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build docs
        run: bun run docs:build
