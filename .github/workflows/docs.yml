name: docs

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - 'docs/**'

  docs-build:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip (no docs/ changes)
        if: needs.changes.outputs.docs != 'true'
        run: echo "No docs/** changes in this event; skipping docs build."

      - name: Checkout
        if: needs.changes.outputs.docs == 'true'
        uses: actions/checkout@v5

      - name: Setup Node
        if: needs.changes.outputs.docs == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        if: needs.changes.outputs.docs == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        if: needs.changes.outputs.docs == 'true'
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Build docs
        if: needs.changes.outputs.docs == 'true'
        working-directory: docs
        run: bun run build
