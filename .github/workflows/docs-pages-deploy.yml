# Manually publish the Vocs site to GitHub Pages (on demand).
#
# Prerequisite: Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.
# Custom domain: Settings → Pages → Custom domain (DNS per GitHub’s instructions). Use a
# public URL with no path prefix, then leave "base_path" empty and set "base_url" to that URL.

name: docs-pages-deploy

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Public docs URL (https://…), no trailing slash — sets Vocs baseUrl"
        required: true
        type: string
      base_path:
        description: "Path prefix only if the site is not at domain root (e.g. /orloj). Usually empty for a custom domain."
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build docs
        env:
          VOCS_BASE_URL: ${{ inputs.base_url }}
          VOCS_BASE_PATH: ${{ inputs.base_path }}
        run: bun run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
