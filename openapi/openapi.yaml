- name: agents
- name: agent-systems
- name: model-endpoints
- name: tools
- name: secrets
- name: memories
- name: agent-policies
- name: agent-roles
- name: tool-permissions
- name: tool-approvals
- name: tasks
- name: task-schedules
- name: task-webhooks
- name: workers
- name: mcp-servers
- name: auth
- name: system
- name: events
