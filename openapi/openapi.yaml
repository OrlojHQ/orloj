      tags:
      - agents
      parameters:
      - name: namespace
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 1000
      - name: after
        in: query
        schema:
          type: string
      - name: labelSelector
        in: query
        schema:
          type: string
      security:
      - bearerAuth: []
      - sessionCookie: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "./schemas/agent.yaml#/components/schemas/AgentList"
        '503':
          description: Store unavailable
          content:
            text/plain:
              schema:
                "$ref": "./schemas/common.yaml#/components/schemas/PlainTextError"
        default:
          description: Error
          content:
            text/plain:
              schema:
                "$ref": "./schemas/common.yaml#/components/schemas/PlainTextError"
    post:
      tags:
      - agents
      security:
      - bearerAuth: []
      - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
