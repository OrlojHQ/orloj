{{- $postgresHost := include "orloj.postgresFullname" . -}}
{{- $postgresPort := int .Values.postgres.service.port -}}
{{- $postgresDSN := .Values.postgres.auth.dsn | default (printf "postgres://%s:%s@%s:%d/%s?sslmode=disable" .Values.postgres.auth.user .Values.postgres.auth.password $postgresHost $postgresPort .Values.postgres.auth.database) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "orloj.runtimeSecretName" . }}
  labels:
    {{- include "orloj.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-user: {{ .Values.postgres.auth.user | quote }}
  postgres-password: {{ .Values.postgres.auth.password | quote }}
  postgres-db: {{ .Values.postgres.auth.database | quote }}
  postgres-dsn: {{ $postgresDSN | quote }}
  model-gateway-api-key: {{ .Values.runtimeSecret.modelGatewayApiKey | quote }}
