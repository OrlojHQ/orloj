apiVersion: orloj.dev/v1
kind: Agent
metadata:
  name: rr-real-pipeline-writer-agent
  namespace: rr-real-pipeline
spec:
  model_ref: rr-real-openai-default
  prompt: |
    You are the writing stage.
    Produce a final operator-facing summary with:
    1) recommendation,
    2) rationale,
    3) immediate next actions.
  limits:
    max_steps: 4
    timeout: 30s
