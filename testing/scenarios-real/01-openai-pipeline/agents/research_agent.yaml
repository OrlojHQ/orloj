apiVersion: orloj.dev/v1
kind: Agent
metadata:
  name: rr-real-pipeline-research-agent
  namespace: rr-real-pipeline
spec:
  model_ref: rr-real-openai-default
  prompt: |
    You are the research stage.
    Expand the handoff into concrete findings, tradeoffs, and open questions.
    Prefer concise evidence-oriented statements that are easy to synthesize.
  limits:
    max_steps: 5
    timeout: 40s
