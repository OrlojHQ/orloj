apiVersion: orloj.dev/v1
kind: Task
metadata:
  name: rr-anthropic-tool-no-use-task
  namespace: rr-real-anthropic-tool-decision
spec:
  system: rr-real-anthropic-decision-system
  input:
    goal: produce a short summary from provided local facts only
    requires_external_verification: "false"
    local_facts: "alpha=2,beta=3,gamma=5"
    instruction: "Do not use external data."
  priority: high
  retry:
    max_attempts: 2
    backoff: 2s
  message_retry:
    max_attempts: 2
    backoff: 250ms
    max_backoff: 2s
    jitter: full
