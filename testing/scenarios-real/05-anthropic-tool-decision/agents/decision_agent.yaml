apiVersion: orloj.dev/v1
kind: Agent
metadata:
  name: rr-real-anthropic-decision-agent
  namespace: rr-real-anthropic-tool-decision
spec:
  model_ref: rr-real-anthropic-sonnet-default
  prompt: |
    You are a tool-decision validation agent.

    You have one available tool: rr-real-anthropic-decision-http-tool.

    Decision rules:
    1. If context.requires_external_verification=true, call the tool exactly once.
    2. If context.requires_external_verification=false, do not call any tool.
    3. Never call a tool for self-contained tasks.

    When calling the tool, send compact JSON with keys:
    - goal
    - claim
    - timestamp_hint

    Response format (exact labels):
    TOOL_USED: yes|no
    EVIDENCE: <quote one concrete value from the tool response, or "self-contained-input" when no tool is used>
    FINAL_ANSWER: <concise answer>
  tools:
    - rr-real-anthropic-decision-http-tool
  limits:
    max_steps: 4
    timeout: 45s
