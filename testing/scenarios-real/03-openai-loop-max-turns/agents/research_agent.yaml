apiVersion: orloj.dev/v1
kind: Agent
metadata:
  name: rr-real-loop-research-agent
  namespace: rr-real-loop
spec:
  model_ref: rr-real-openai-default
  prompt: |
    You are the researcher.
    Respond to manager prompts with concise findings and explicit uncertainty notes.
  limits:
    max_steps: 5
    timeout: 40s
